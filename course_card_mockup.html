<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课程卡片设计方案</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f0f2f5;
    padding: 16px;
    max-width: 430px;
    margin: 0 auto;
  }
  h2 {
    font-size: 24px;
    font-weight: 700;
    color: #1a1a1a;
    padding: 8px 0 12px 4px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    border: 0.5px solid rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  .badge {
    background: #FF4757;
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
  }
  .card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-teacher {
    font-size: 12px;
    color: #8c8c8c;
    line-height: 1.3;
  }
  .card-stats {
    display: flex;
    gap: 10px;
    padding-top: 6px;
    border-top: 1px solid rgba(0,0,0,0.04);
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    color: #bfbfbf;
  }
  .stat.active { color: #F59E0B; }
  .stat.info { color: #3B82F6; }
  .stat svg { width: 13px; height: 13px; }

  .c-red { background: linear-gradient(135deg, #FF6B6B, #EE5A24); }
  .c-blue { background: linear-gradient(135deg, #4ECDC4, #2196F3); }
  .c-orange { background: linear-gradient(135deg, #FFB347, #F97316); }
  .c-purple { background: linear-gradient(135deg, #A78BFA, #7C3AED); }
  .c-pink { background: linear-gradient(135deg, #F472B6, #EC4899); }
  .c-teal { background: linear-gradient(135deg, #2DD4BF, #14B8A6); }
  .c-indigo { background: linear-gradient(135deg, #818CF8, #6366F1); }
</style>
</head>
<body>

<h2>课程</h2>
<div class="grid">

  <div class="card">
    <div class="card-header">
      <div class="card-icon c-red">工</div>
      <div class="badge">3</div>
    </div>
    <div class="card-body">
      <div class="card-title">工业系统概论</div>
      <div class="card-teacher">汤彬</div>
    </div>
    <div class="card-stats">
      <span class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>0</span>
      <span class="stat active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>3</span>
      <span class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>0</span>
    </div>
  </div>

  <div class="card">

      <div class="badge">2</div>
    </div>

      <span class="stat active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>2</span>
      <span class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>0</span>
    </div>

      <div class="badge">2</div>
    </div>

      <div class="card-title">计算机组成原理</div>
      <div class="card-teacher">杨铮</div>
    </div>

      <span class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>0</span>

      <span class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>0</span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon c-purple">分</div>
      <div class="badge">1</div>
    </div>
    <div class="card-body">
      <div class="card-title">分子生物学</div>
      <div class="card-teacher">李春</div>
    </div>
    <div class="card-stats">
      <span class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>0</span>
      <span class="stat active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>1</span>
      <span class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>0</span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon c-pink">医</div>
      <div class="badge">1</div>
    </div>
    <div class="card-body">
      <div class="card-title">医学细胞生物学实验</div>
      <div class="card-teacher">潘登</div>
    </div>
    <div class="card-stats">
      <span class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>0</span>
      <span class="stat active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>1</span>
      <span class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>0</span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-icon c-indigo">法</div>
    </div>
    <div class="card-body">
      <div class="card-title">法律与神话传说</div>
      <div class="card-teacher">李平</div>
    </div>
    <div class="card-stats">
      <span class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>0</span>
      <span class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>0</span>

    </div>

</div>

</body>
</html>
