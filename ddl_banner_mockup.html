<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDL Banner 设计方案</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #F2F2F7;
    padding: 16px;
    max-width: 393px;
    margin: 0 auto;
  }

  .ddl-banner {
    border-radius: 16px;
    overflow: hidden;
    background: linear-gradient(180deg, #FFF7EE 0%, #FFF3E4 100%);
    box-shadow:
      0 0 0 0.5px rgba(200,160,100,0.12),
      0 1px 3px rgba(200,160,100,0.06);
  }

  .ddl-header {
    display: flex;
    align-items: center;
    padding: 14px 16px 8px;
  }
  .ddl-pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #FF9F0A;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,159,10,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(255,159,10,0); }
  }
  .ddl-title {
    font-size: 13px;
    font-weight: 600;
    color: #B5710D;
    margin-left: 8px;
    flex: 1;
  }
  .threshold-badge {
    font-size: 10px;
    color: #C09060;
    font-weight: 500;
    padding: 2px 6px;
    background: rgba(180,120,60,0.07);
    border-radius: 4px;
  }
  .ddl-settings {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: rgba(180,120,60,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
    border: none;
    color: #B5710D;
    margin-left: 6px;
  }
  .ddl-settings:hover { background: rgba(180,120,60,0.14); }

  .ddl-item {
    display: flex;
    align-items: center;
    padding: 11px 16px;
    gap: 10px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .ddl-item:active { transform: scale(0.985); }
  .ddl-item + .ddl-item {
    border-top: 1px solid rgba(180,120,60,0.06);
  }
  .ddl-item:last-child { padding-bottom: 14px; }

  .ddl-seq {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    width: 18px;
    text-align: center;
    flex-shrink: 0;
    line-height: 1;
    user-select: none;
  }
  .ddl-seq.critical { color: #FF3B30; opacity: 0.6; }
  .ddl-seq.warning  { color: #E8590C; opacity: 0.5; }
  .ddl-seq.normal   { color: #007AFF; opacity: 0.35; }

  .ddl-content { flex: 1; min-width: 0; }
  .ddl-course {
    font-size: 11px;
    font-weight: 500;
    color: #A08060;
    letter-spacing: 0.2px;
    margin-bottom: 2px;
  }
  .ddl-name {
    font-size: 15px;
    font-weight: 600;
    color: #1C1C1E;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ddl-time-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    flex-shrink: 0;
    gap: 2px;
  }
  .ddl-countdown {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .ddl-countdown.critical { color: #FF3B30; }
  .ddl-countdown.warning  { color: #E8590C; }
  .ddl-countdown.normal   { color: #007AFF; }

  .ddl-date-sub {
    font-size: 10px;
    color: #B09880;
    font-weight: 500;
  }

  .ddl-progress {
    width: 56px;
    height: 2px;
    background: rgba(180,120,60,0.07);
    border-radius: 1px;
    overflow: hidden;
    margin-top: 3px;
  }
  .ddl-progress-fill {
    height: 100%;
    border-radius: 1px;
    background: linear-gradient(90deg, #007AFF, #E8590C, #FF3B30);
  }

  .ddl-chevron {
    color: #D0C0B0;
    font-size: 14px;
    margin-left: 2px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="ddl-banner">
  <div class="ddl-header">
    <div class="ddl-pulse"></div>
    <div class="ddl-title">5 个作业即将截止</div>
    <span class="threshold-badge">72h</span>
    <button class="ddl-settings" title="设置阈值">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06c.5.5 1.21.71 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06c-.5.5-.71 1.21-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div class="ddl-item">
    <span class="ddl-seq critical">1</span>
    <div class="ddl-content">
      <div class="ddl-course">有限元分析基础</div>
      <div class="ddl-name">第三次作业：梁的弯曲分析</div>
    </div>
    <div class="ddl-time-wrap">
      <div class="ddl-countdown critical">05:32:17</div>
      <div class="ddl-date-sub">今天 23:59</div>
      <div class="ddl-progress"><div class="ddl-progress-fill" style="width:92%"></div></div>
    </div>
    <span class="ddl-chevron">›</span>
  </div>

  <div class="ddl-item">
    <span class="ddl-seq warning">2</span>
    <div class="ddl-content">
      <div class="ddl-course">工业系统概论</div>
      <div class="ddl-name">谈谈你对济钢产线退出济南的认识</div>
    </div>
    <div class="ddl-time-wrap">
      <div class="ddl-countdown warning">明天 15:59</div>
      <div class="ddl-date-sub">3月20日</div>
    </div>
    <span class="ddl-chevron">›</span>
  </div>

  <div class="ddl-item">
    <span class="ddl-seq warning">3</span>
    <div class="ddl-content">
      <div class="ddl-course">分子生物学</div>
      <div class="ddl-name">第3次作业</div>
    </div>
    <div class="ddl-time-wrap">
      <div class="ddl-countdown warning">后天 10:00</div>
      <div class="ddl-date-sub">3月21日</div>
    </div>
    <span class="ddl-chevron">›</span>
  </div>

  <div class="ddl-item">
    <span class="ddl-seq normal">4</span>
    <div class="ddl-content">
      <div class="ddl-course">医学细胞生物学实验</div>
      <div class="ddl-name">Week 4.实验报告</div>
    </div>
    <div class="ddl-time-wrap">
      <div class="ddl-countdown normal">本周日 15:59</div>
      <div class="ddl-date-sub">3月23日</div>
    </div>
    <span class="ddl-chevron">›</span>
  </div>

  <div class="ddl-item">
    <span class="ddl-seq normal">5</span>
    <div class="ddl-content">
      <div class="ddl-course">计算机组成原理</div>
      <div class="ddl-name">Cache 模拟器实现</div>
    </div>
    <div class="ddl-time-wrap">
      <div class="ddl-countdown normal">下周三 10:00</div>
      <div class="ddl-date-sub">3月26日</div>
    </div>
    <span class="ddl-chevron">›</span>
  </div>
</div>

</body>
</html>
